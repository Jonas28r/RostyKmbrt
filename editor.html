<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Vriza Scanlate Studio</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; margin: 0; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        #toolbar { background: #1f1f1f; padding: 10px; display: flex; gap: 10px; overflow-x: auto; border-bottom: 1px solid #333; }
        .canvas-container { flex-grow: 1; display: flex; justify-content: center; align-items: center; background: #000; overflow: auto; }
        button { background: #007bff; color: white; border: none; padding: 10px; border-radius: 5px; white-space: nowrap; }
        #apiKeySection { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        input { padding: 10px; width: 80%; border-radius: 5px; border: none; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="apiKeySection">
        <h3>Configuración de Vriza</h3>
        <input type="password" id="apiInput" placeholder="Pega tu API Key de Gemini aquí">
        <button onclick="saveKey()">Guardar y Empezar</button>
    </div>

    <div id="toolbar">
        <input type="file" id="upload" accept="image/*" style="display:none">
        <button onclick="document.getElementById('upload').click()">Subir Manhwa</button>
        <button onclick="translateImage()">Traducir con IA</button>
        <button onclick="addText()">+ Texto</button>
        <button onclick="deleteObject()" style="background:red">Borrar</button>
        <button onclick="downloadImage()" style="background:green">Descargar WebP</button>
    </div>

    <div class="canvas-container">
        <canvas id="editorCanvas"></canvas>
    </div>

    <script>
        let canvas = new fabric.Canvas('editorCanvas');
        let API_KEY = localStorage.getItem('vriza_key');

        if(API_KEY) document.getElementById('apiKeySection').style.display = 'none';

        function saveKey() {
            const key = document.getElementById('apiInput').value;
            if(key) {
                localStorage.setItem('vriza_key', key);
                API_KEY = key;
                document.getElementById('apiKeySection').style.display = 'none';
            }
        }

        // Subir imagen al canvas
        document.getElementById('upload').onchange = function(e) {
            let reader = new FileReader();
            reader.onload = function(event) {
                fabric.Image.fromURL(event.target.result, function(img) {
                    canvas.clear();
                    img.set({ selectable: false });
                    canvas.setWidth(img.width);
                    canvas.setHeight(img.height);
                    canvas.add(img);
                    canvas.renderAll();
                });
            }
            reader.readAsDataURL(e.target.files[0]);
        };

        function addText() {
            let text = new fabric.IText('Nuevo Texto', {
                left: 50, top: 50, fontFamily: 'Arial', fontSize: 24, fill: 'black', backgroundColor: 'white'
            });
            canvas.add(text);
        }

        function deleteObject() {
            canvas.remove(canvas.getActiveObject());
        }

        async function translateImage() {
            if(!API_KEY) return alert("Falta la API Key");
            alert("Enviando a Gemini... espera unos segundos.");
            // Aquí irá la conexión real con Gemini en el siguiente paso
        }

        function downloadImage() {
            const dataURL = canvas.toDataURL({ format: 'webp', quality: 0.8 });
            const link = document.createElement('a');
            link.href = dataURL;
            link.download = 'vriza_editado.webp';
            link.click();
        }
    </script>
</body>
</html>
