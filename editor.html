<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Vriza Scanlate Studio</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #toolbar { background: #1f1f1f; padding: 10px; display: flex; gap: 8px; overflow-x: auto; border-bottom: 2px solid #333; }
        .canvas-container { flex-grow: 1; display: flex; justify-content: center; align-items: flex-start; background: #000; overflow: auto; }
        button { background: #007bff; color: white; border: none; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; white-space: nowrap; }
        #apiKeySection { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        #apiKeySection input { padding: 15px; width: 80%; border-radius: 6px; margin-bottom: 15px; border: none; font-size: 16px; }
        #status { position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.8); font-size: 12px; padding: 5px; text-align: center; }
    </style>
</head>
<body>

    <div id="apiKeySection">
        <h3>Configuración Vriza</h3>
        <input type="password" id="apiInput" placeholder="Pega tu clave AIza... aquí">
        <button onclick="saveKey()">Guardar Clave</button>
    </div>

    <div id="toolbar">
        <input type="file" id="upload" accept="image/*" style="display:none">
        <button onclick="document.getElementById('upload').click()">📂 Subir</button>
        <button onclick="translateImage()" style="background: #6f42c1;">🤖 Traducir</button>
        <button onclick="addText()">+ Texto</button>
        <button onclick="deleteObject()" style="background: #dc3545;">🗑️ Borrar</button>
        <button onclick="downloadImage()" style="background: #28a745;">💾 Descargar</button>
    </div>

    <div class="canvas-container">
        <canvas id="editorCanvas"></canvas>
    </div>
    <div id="status">Esperando imagen...</div>

    <script>
        const canvas = new fabric.Canvas('editorCanvas');
        let API_KEY = localStorage.getItem('vriza_key');
        const status = document.getElementById('status');

        if(API_KEY) document.getElementById('apiKeySection').style.display = 'none';

        function saveKey() {
            const key = document.getElementById('apiInput').value.trim();
            if(key) {
                localStorage.setItem('vriza_key', key);
                API_KEY = key;
                document.getElementById('apiKeySection').style.display = 'none';
                location.reload();
            }
        }

        document.getElementById('upload').onchange = function(e) {
            const reader = new FileReader();
            reader.onload = function(event) {
                fabric.Image.fromURL(event.target.result, function(img) {
                    canvas.clear();
                    const maxWidth = window.innerWidth * 0.9;
                    if(img.width > maxWidth) {
                        img.scaleToWidth(maxWidth);
                    }
                    canvas.setWidth(img.getScaledWidth());
                    canvas.setHeight(img.getScaledHeight());
                    canvas.add(img);
                    img.set({selectable: false, evented: false});
                    canvas.renderAll();
                    status.innerText = "Imagen lista para traducir.";
                });
            }
            reader.readAsDataURL(e.target.files[0]);
        };

        async function translateImage() {
            if(!API_KEY) return alert("Pega tu clave API primero.");
            const fileInput = document.getElementById('upload');
            if(!fileInput.files[0]) return alert("Sube una imagen.");

            status.innerText = "La IA está trabajando...";
            const reader = new FileReader();
            reader.readAsDataURL(fileInput.files[0]);
            reader.onload = async () => {
                const base64Data = reader.result.split(',')[1];
                const prompt = "Detect text bubbles in this manhwa. Translate to Spanish. Return ONLY a JSON array like this: [{\"t\": \"texto traducido\", \"x\": 10, \"y\": 10}]. Coordinates should be relative to image size.";

                try {
                    const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            contents: [{parts: [{text: prompt}, {inline_data: {mime_type: "image/jpeg", data: base64Data}}]}]
                        })
                    });

                    const data = await resp.json();
                    if(data.error) throw new Error(data.error.message);

                    let txt = data.candidates[0].content.parts[0].text;
                    const jsonMatch = txt.match(/\[.*\]/s);
                    if(!jsonMatch) throw new Error("La IA no devolvió un formato válido.");
                    
                    const translations = JSON.parse(jsonMatch[0]);
                    translations.forEach(item => {
                        const itext = new fabric.IText(item.t, {
                            left: (item.x * canvas.width / 100) || 50,
                            top: (item.y * canvas.height / 100) || 50,
                            fontSize: 20, fill: 'black', backgroundColor: 'white',
                            fontFamily: 'sans-serif', textAlign: 'center'
                        });
                        canvas.add(itext);
                    });
                    status.innerText = "¡Hecho! Mueve los textos a los globos.";
                    canvas.renderAll();
                } catch (e) {
                    alert("Error: " + e.message);
                    status.innerText = "Error en el proceso.";
                }
            };
        }

        function addText() {
            canvas.add(new fabric.IText('Toca para editar', {
                left: 50, top: 50, fontSize: 20, fill: 'black', backgroundColor: 'white'
            }));
        }

        function deleteObject() {
            if(canvas.getActiveObject()) canvas.remove(canvas.getActiveObject());
        }

        function downloadImage() {
            const link = document.createElement('a');
            link.href = canvas.toDataURL({format: 'webp', quality: 0.8});
            link.download = 'vriza_scan.webp';
            link.click();
        }
    </script>
</body>
</html>
