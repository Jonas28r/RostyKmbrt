<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Vriza Scanlate Studio</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #toolbar { background: #1f1f1f; padding: 10px; display: flex; gap: 8px; overflow-x: auto; border-bottom: 2px solid #333; align-items: center; }
        .canvas-container { flex-grow: 1; display: flex; justify-content: center; align-items: flex-start; background: #000; overflow: auto; padding: 10px; }
        button { background: #007bff; color: white; border: none; padding: 10px 15px; border-radius: 6px; font-weight: bold; cursor: pointer; white-space: nowrap; }
        button:active { background: #0056b3; }
        #apiKeySection { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(18,18,18,0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; text-align: center; }
        #apiKeySection input { padding: 12px; width: 80%; border-radius: 6px; border: 1px solid #444; background: #222; color: white; margin-bottom: 15px; font-size: 16px; }
        #status { position: fixed; bottom: 10px; left: 10px; background: rgba(0,0,0,0.7); padding: 5px 10px; border-radius: 4px; font-size: 12px; pointer-events: none; }
    </style>
</head>
<body>

    <div id="apiKeySection">
        <h2>Vriza Setup</h2>
        <p>Pega tu API Key de Gemini para activar la IA</p>
        <input type="password" id="apiInput" placeholder="AI Key aquí...">
        <button onclick="saveKey()">Guardar Configuración</button>
    </div>

    <div id="toolbar">
        <input type="file" id="upload" accept="image/*" style="display:none">
        <button onclick="document.getElementById('upload').click()">📂 Subir</button>
        <button onclick="translateImage()" style="background: #6f42c1;">🤖 Traducir IA</button>
        <button onclick="addText()">+ Texto</button>
        <button onclick="deleteObject()" style="background: #dc3545;">🗑️ Borrar</button>
        <button onclick="downloadImage()" style="background: #28a745;">💾 Descargar WebP</button>
    </div>

    <div id="status">Listo</div>

    <div class="canvas-container">
        <canvas id="editorCanvas"></canvas>
    </div>

    <script>
        const canvas = new fabric.Canvas('editorCanvas');
        let API_KEY = localStorage.getItem('vriza_key');
        const statusLabel = document.getElementById('status');

        if(API_KEY) document.getElementById('apiKeySection').style.display = 'none';

        function saveKey() {
            const key = document.getElementById('apiInput').value;
            if(key) {
                localStorage.setItem('vriza_key', key);
                API_KEY = key;
                document.getElementById('apiKeySection').style.display = 'none';
            }
        }

        // Cargar imagen al editor
        document.getElementById('upload').onchange = function(e) {
            const reader = new FileReader();
            reader.onload = function(event) {
                fabric.Image.fromURL(event.target.result, function(img) {
                    canvas.clear();
                    img.set({ selectable: false, evented: false });
                    canvas.setWidth(img.width);
                    canvas.setHeight(img.height);
                    canvas.add(img);
                    canvas.renderAll();
                    statusLabel.innerText = "Imagen cargada: " + img.width + "x" + img.height;
                });
            }
            reader.readAsDataURL(e.target.files[0]);
        };

        function addText() {
            const text = new fabric.IText('Nuevo Texto', {
                left: 100, top: 100, fontFamily: 'Arial', fontSize: 24, 
                fill: 'black', backgroundColor: 'white', padding: 5
            });
            canvas.add(text);
            canvas.setActiveObject(text);
        }

        function deleteObject() {
            const active = canvas.getActiveObject();
            if(active) canvas.remove(active);
        }

        async function translateImage() {
            if(!API_KEY) return alert("Configura tu API Key primero.");
            const fileInput = document.getElementById('upload');
            if(!fileInput.files[0]) return alert("Sube una imagen primero.");

            statusLabel.innerText = "IA analizando y traduciendo...";
            
            const reader = new FileReader();
            reader.readAsDataURL(fileInput.files[0]);
            reader.onload = async () => {
                const base64Data = reader.result.split(',')[1];
                
                // Prompt optimizado para obtener coordenadas
                const prompt = "Detect all text bubbles in this manhwa page. Translate them to Spanish. Return ONLY a JSON list of objects like this: [{\"texto\": \"traduccion\", \"x\": pos_x, \"y\": pos_y}]. Use the original coordinates from the image pixels.";

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{
                                parts: [
                                    { text: prompt },
                                    { inline_data: { mime_type: "image/jpeg", data: base64Data } }
                                ]
                            }]
                        })
                    });

                    const data = await response.json();
                    const aiResponse = data.candidates[0].content.parts[0].text;
                    const cleanJson = JSON.parse(aiResponse.replace(/```json|```/g, ""));

                    cleanJson.forEach(item => {
                        const t = new fabric.IText(item.texto, {
                            left: item.x, 
                            top: item.y,
                            fontFamily: 'sans-serif',
                            fontSize: 20,
                            fill: 'black',
                            backgroundColor: 'white',
                            textAlign: 'center'
                        });
                        canvas.add(t);
                    });

                    statusLabel.innerText = "Traducción completa.";
                } catch (error) {
                    console.error(error);
                    alert("Error con la IA. Verifica que tu Key sea válida.");
                    statusLabel.innerText = "Error en el proceso.";
                }
            };
        }

        function downloadImage() {
            statusLabel.innerText = "Generando WebP...";
            const dataURL = canvas.toDataURL({ format: 'webp', quality: 0.8 });
            const link = document.createElement('a');
            link.href = dataURL;
            link.download = 'capitulo_vriza.webp';
            link.click();
            statusLabel.innerText = "Descargado.";
        }
    </script>
</body>
</html>
